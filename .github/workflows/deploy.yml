name: Deploy to GitHub Pages

# Publishes the repo root (the whole static site) to GitHub Pages on every
# push to main, and after the scheduled event refresh commits new data.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # serve the repo root (index.html, assets/, data/)
      - id: deployment
        uses: actions/deploy-pages@v4

name: Check data freshness

# Weekly watchdog for the CURATED data the event refresher doesn't touch:
# verifies every booking/info link is still live, that the Medora Musical's
# advertised season still matches the months in data/medora.json, and that
# events.json isn't stale. It never edits data — if it finds drift, it opens
# or updates a tracking issue for a human to confirm and fix.

on:
  schedule:
    - cron: "30 11 * * 1"   # Mondays 11:30 UTC, just after the event refresh
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run freshness + link checks
        id: check
        run: node scripts/check-data-freshness.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: data/freshness-report.md

      - name: Open/update issue on drift
        if: steps.check.outputs.status == 'warn'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("data/freshness-report.md", "utf8");
            const label = "automated-data-check";
            const title = "⚠ Data freshness: links or hours need review";
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: label });
            const found = existing.data.find(i => i.title === title);
            if (found) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: found.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, labels: [label], body });
            }

name: Refresh events

# Pulls fresh event data from medora.com, the ND Cowboy Hall of Fame,
# the National Park (NPS) and the Medora Chamber into data/events.json,
# then commits it. Pages redeploys automatically on the push.

on:
  schedule:
    - cron: "0 11 * * *"   # daily at 11:00 UTC (~5–6am Central)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh events.json
        run: node scripts/refresh-events.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/events.json)" ]]; then
            git config user.name  "trpl-bot"
            git config user.email "bot@trlibrary.com"
            git add data/events.json
            git commit -m "chore: refresh events $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No event changes."
          fi

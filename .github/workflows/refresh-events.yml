name: Refresh events

# Pulls fresh event data from medora.com, the ND Cowboy Hall of Fame, the
# National Park (NPS), the Medora Chamber and VisitDickinson into
# data/events.json, then commits it. Pages redeploys automatically on the push.
# Runs WEEKLY. If any source fails, yields nothing, or the data looks stale,
# it opens/updates a tracking issue so failures are never silent.

on:
  schedule:
    - cron: "0 11 * * 1"   # Mondays 11:00 UTC (~5–6am Central)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Playwright renders the JS-heavy sources (Medora calendar, VisitDickinson).
      # Installed only in CI — it is NOT a project dependency.
      - name: Install Playwright (Chromium)
        run: |
          npm install playwright@1.48.0
          npx playwright install --with-deps chromium

      - name: Refresh events.json
        id: refresh
        run: node scripts/refresh-events.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/events.json)" ]]; then
            git config user.name  "trpl-bot"
            git config user.email "bot@trlibrary.com"
            git add data/events.json
            git commit -m "chore: refresh events $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No event changes."
          fi

      - name: Open/update issue on trouble
        if: steps.refresh.outputs.status == 'warn'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = ${{ toJSON(steps.refresh.outputs.summary) }};
            const body = `One or more event sources need attention (weekly refresh):\n\n\`\`\`\n${summary}\n\`\`\`\n\nThe planner kept the previous data for any failing source, so nothing is broken for visitors — but a scraper or source URL may have changed. See \`scripts/refresh-events.mjs\`.`;
            const label = "automated-data-check";
            const title = "⚠ Event refresh needs attention";
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: label });
            const found = existing.data.find(i => i.title === title);
            if (found) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: found.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, labels: [label], body });
            }
